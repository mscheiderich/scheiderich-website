<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thank You | The Scheiderich Agency</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background-color: #f2f4f7;
      color: #0f2744;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background-color: #0f2744;
      padding: 1.25rem 1rem;
      text-align: center;
    }

    header h1 {
      color: #ffffff;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.02em;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }

    .card {
      background-color: #ffffff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(15, 39, 68, 0.10);
      padding: 3rem 2.5rem;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .checkmark {
      font-size: 4rem;
      color: #1e7d4f;
      line-height: 1;
      margin-bottom: 1.25rem;
      display: block;
    }

    .card h2 {
      font-size: 1.75rem;
      font-weight: 600;
      color: #0f2744;
      margin-bottom: 0.75rem;
    }

    .card .subheading {
      font-size: 1.05rem;
      font-weight: 500;
      color: #0f2744;
      margin-bottom: 1rem;
    }

    .card .body-text {
      font-size: 0.95rem;
      color: #3a4f66;
      line-height: 1.65;
      margin-bottom: 1.5rem;
    }

    .phone {
      display: block;
      font-size: 1.35rem;
      font-weight: 600;
      color: #1e7d4f;
      text-decoration: none;
      margin-bottom: 2rem;
      letter-spacing: 0.02em;
    }

    .phone:hover {
      text-decoration: underline;
    }

    .btn {
      display: inline-block;
      background-color: #1e7d4f;
      color: #ffffff;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      padding: 0.75rem 2rem;
      border-radius: 6px;
      text-decoration: none;
      transition: background-color 0.2s ease;
    }

    .btn:hover {
      background-color: #165f3c;
    }

    footer {
      background-color: #0f2744;
      color: #ffffff;
      text-align: center;
      padding: 1rem;
      font-size: 0.85rem;
    }

    @media (max-width: 540px) {
      .card {
        padding: 2rem 1.25rem;
      }

      .card h2 {
        font-size: 1.4rem;
      }

      .checkmark {
        font-size: 3rem;
      }

      header h1 {
        font-size: 1.2rem;
      }
    }
  </style>
</head>
<body>

  <header>
    <h1>The Scheiderich Agency</h1>
  </header>

  <main>
    <div class="card">
      <span class="checkmark">✓</span>
      <h2>Message Received</h2>
      <p class="subheading">Thank you for reaching out to The Scheiderich Agency.</p>
      <p class="body-text">We'll review your message and be in touch within one business day. If your matter is urgent, please call us directly.</p>
      <a href="tel:+17702684418" class="phone">770-268-4418</a>
      <a href="index.html" class="btn">Return to Home</a>
    </div>
  </main>

  <footer>
    <p>&copy; 2026 The Scheiderich Agency. All rights reserved.</p>
  </footer>

</body>
</html>
